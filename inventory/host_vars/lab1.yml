---
nvidia_gpu: true

downloads_dir: "/mnt/reds/downloads"

system_optimize_mounts:
  - /
  - /mnt/scratch
  - /mnt/green

# Beszel agent configuration
beszel_smart_devices:
  - /dev/sda:/dev/sda
  - /dev/sdb:/dev/sdb
  - /dev/sdc:/dev/sdc
  - /dev/sdd:/dev/sdd
  - /dev/nvme0:/dev/nvme0
beszel_smart_cap_add:
  - SYS_RAWIO
  - SYS_ADMIN
beszel_extra_volumes:
  - /mnt/reds/.beszel:/extra-filesystems/sda__reds:ro
  - /mnt/scratch/.beszel:/extra-filesystems/sdb1__scratch:ro
  - /mnt/green/.beszel:/extra-filesystems/sdd1__green:ro

# ── Kopia backup sources ────────────────────────────────────────────────
backup_sources:
  step_ca:
    hostname: server
    paths:
      "{{ step_ca_data_dir }}/certs":
        retention:
          keep_latest: 10
          keep_daily: 30
          keep_monthly: 12
          keep_annual: 5
      "{{ step_ca_data_dir }}/secrets":
        retention:
          keep_latest: 10
          keep_daily: 30
          keep_monthly: 12
          keep_annual: 5

  postgres:
    hostname: server
    paths:
      "{{ postgres_data_dir }}":
        retention:
          keep_latest: 10
          keep_hourly: 48
          keep_daily: 7
          keep_weekly: 4
          keep_monthly: 24
          keep_annual: 3
    actions:
      before-snapshot-root: true

  vaultwarden:
    hostname: server
    paths:
      "{{ vaultwarden_data_dir }}":
        retention:
          keep_latest: 10
          keep_hourly: 48
          keep_daily: 30
          keep_monthly: 12
          keep_annual: 5
    actions:
      before-snapshot-root: true
      after-snapshot-root: true

  linkwarden:
    hostname: server
    paths:
      "{{ linkwarden_data_dir }}/data":
        retention:
          keep_latest: 10
          keep_daily: 30
          keep_monthly: 12
          keep_annual: 5
