---
all:
  hosts:
    router:
      # openwrt.lan resolves via the router's own dnsmasq both before
      # (192.168.1.1 factory default) and after (10.10.10.1) Ansible runs.
      ansible_host: openwrt.lan
      ansible_user: root
      ansible_ssh_pass: "{{ vault_router_ssh_pass }}"
      ansible_connection: ssh
      ansible_port: 22
      ansible_ssh_transfer_method: piped
      ansible_ssh_use_tty: false
      ansible_scp_if_ssh: false
      ansible_remote_tmp: /tmp/.ansible
      ansible_python_interpreter: none
    lab1:
      ansible_host: lab1.lan
      lab_index: 1
    lab2:
      ansible_host: lab2.lan
      lab_index: 2

  children:
    routers:
      hosts:
        router:

    servers:
      hosts:
        lab1:
        lab2:
      vars:
        ansible_python_interpreter: /usr/bin/python3

    docker_hosts:
      hosts:
        lab1:
        lab2:

    step_ca_hosts:
      hosts:
        lab1:

    traefik_hosts:
      hosts:
        lab1:
        lab2:

    portainer_hosts:
      hosts:
        lab1:

    vaultwarden_hosts:
      hosts:
        lab1:

    qbittorrent_hosts:
      hosts:
        lab1:
        lab2:

    portainer_edge_hosts:
      hosts:
        lab2:

    inpx_web_hosts:
      hosts:
        lab2:

    postgres_hosts:
      hosts:
        lab1:

    linkwarden_hosts:
      hosts:
        lab1:

    beszel_hosts:
      hosts:
        lab1:

    beszel_agent_hosts:
      hosts:
        lab1:
        lab2:
