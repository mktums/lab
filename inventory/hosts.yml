---
all:
  hosts:
    router:
      ansible_host: "openwrt.{{ lan_domain }}"
      ansible_user: root
      ansible_ssh_pass: "{{ vault_router_ssh_pass }}"
      ansible_connection: ssh
      ansible_port: 22
      ansible_ssh_transfer_method: piped
      ansible_ssh_use_tty: false
      ansible_remote_tmp: /tmp/.ansible
      ansible_python_interpreter: none
    lab1:
      ansible_host: "lab1.{{ lan_domain }}"
    lab2:
      ansible_host: "lab2.{{ lan_domain }}"

  children:
    routers:
      hosts:
        router:

    servers:
      hosts:
        lab1:
        lab2:

    docker_hosts:
      hosts:
        lab1:
        lab2:

    step_ca_hosts:
      hosts:
        lab1:

    traefik_hosts:
      hosts:
        lab1:
        lab2:

    portainer_hosts:
      hosts:
        lab1:

    vaultwarden_hosts:
      hosts:
        lab1:

    qbittorrent_hosts:
      hosts:
        lab1:
        lab2:

    portainer_edge_hosts:
      hosts:
        lab2:

    inpx_web_hosts:
      hosts:
        lab2:

    postgres_hosts:
      hosts:
        lab1:

    linkwarden_hosts:
      hosts:
        lab1:

    beszel_hosts:
      hosts:
        lab1:

    beszel_agent_hosts:
      hosts:
        lab1:
        lab2:
