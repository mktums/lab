---
# Single-play deployment with meta dependency resolution
#
# Dependency chain (resolved automatically via role meta/main.yml):
#   server_base → docker → step_ca → install_ca_cert → traefik → [services]
#   postgres + meilisearch → linkwarden (via meta deps)
#
# Roles are deduplicated within this play — dependencies run once.
# Guards (`when: inventory_hostname in groups[...`) prevent execution on wrong hosts.
#
# Usage:
#   ansible-playbook servers.yml                     # full deploy
#   ansible-playbook servers.yml --tags traefik      # traefik + its deps (step_ca)
#   ansible-playbook servers.yml --limit lab2        # all roles, only on lab2
#   ansible-playbook servers.yml --tags beszel -e "beszel_token=..."  # selective
#
- name: Deploy homelab services
  hosts: servers
  become: true
  vars_files:
    - ../vault/secrets.yml

  roles:
    # Base infrastructure (runs on all servers via hosts: filter)
    - role: server_base
      tags: [server_base]

    - role: docker
      tags: [docker]
      when: inventory_hostname in groups.get('docker_hosts', [])

    # CA + reverse proxy chain (step_ca → traefik via meta dep)
    - role: step_ca
      tags: [step_ca]
      when: inventory_hostname in groups.get('step_ca_hosts', [])

    - role: install_ca_cert
      tags: [install_ca_cert]

    # Meta services (shared infrastructure)
    - role: meilisearch
      tags: [meilisearch]
      when: inventory_hostname in groups.get('linkwarden_hosts', [])

    - role: postgres
      tags: [postgres]
      when: inventory_hostname in groups.get('postgres_hosts', [])

    # Application services (meta deps auto-resolve)
    - role: traefik
      tags: [traefik]
      when: inventory_hostname in groups.get('traefik_hosts', [])

    # Beszel (hub + agents split into separate roles)
    - role: beszel_hub
      tags: [beszel, beszel_hub]
      when: inventory_hostname in groups.get('beszel_hosts', [])

    - role: beszel
      tags: [beszel, beszel_agent]
      when: inventory_hostname in groups.get('beszel_agent_hosts', [])

    - role: portainer
      tags: [portainer]
      when: inventory_hostname in groups.get('portainer_hosts', [])

    - role: vaultwarden
      tags: [vaultwarden]
      when: inventory_hostname in groups.get('vaultwarden_hosts', [])

    - role: qbittorrent
      tags: [qbittorrent]
      when: inventory_hostname in groups.get('qbittorrent_hosts', [])

    - role: portainer_edge
      tags: [portainer_edge]
      when: inventory_hostname in groups.get('portainer_edge_hosts', [])

    - role: inpx_web
      tags: [inpx_web]
      when: inventory_hostname in groups.get('inpx_web_hosts', [])

    - role: linkwarden
      tags: [linkwarden]
      when: inventory_hostname in groups.get('linkwarden_hosts', [])
