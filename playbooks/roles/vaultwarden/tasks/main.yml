---
- ansible.builtin.include_tasks: deploy.yml
- name: Register Vaultwarden CNAME
  ansible.builtin.include_role:
    name: common
    tasks_from: register_cname
  vars:
    cname_name: "{{ vaultwarden_cname_name | default('vw.' + lan_domain) }}"
    cname_target: "{{ vaultwarden_cname_target | default(inventory_hostname + '.' + lan_domain) }}"
