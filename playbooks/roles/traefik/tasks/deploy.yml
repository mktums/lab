---
# IMPORTANT: This task must run AFTER step_ca.yml completes its trust store updates

- name: Create Traefik directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ traefik_config_dir }}"
    - "{{ traefik_data_dir }}/acme"

- name: Flush handlers to ensure CA trust store is updated before Traefik restarts
  ansible.builtin.meta: flush_handlers

- name: Ensure CA certificates are up to date with fresh trust store sync
  ansible.builtin.command: update-ca-certificates --fresh
  changed_when: false
  
- name: Deploy Traefik dynamic config only (for routers/middlewares)
  ansible.builtin.template:
    src: traefik-dynamic.yml.j2
    dest: "{{ traefik_config_dir }}/traefik-dynamic.yml"
    mode: "0644"
  notify: Restart Traefik

- name: Ensure acme.json exists with correct permissions
  ansible.builtin.file:
    path: "{{ traefik_data_dir }}/acme/acme.json"
    state: touch
    owner: root
    group: root
    mode: "0600"
    modification_time: preserve
    access_time: preserve

- name: Deploy Traefik container with CLI arguments
  community.docker.docker_container:
    name: traefik
    image: "{{ traefik_image_name }}:{{ traefik_image_tag }}"
    pull: missing
    restart_policy: unless-stopped
    network_mode: host
    command: >
      --global.checknewversion=false
      --global.sendanonymoususage=false
      --log.level=INFO
      --api.dashboard=true
      --entrypoints.web.address=:80
      --entrypoints.web.http.redirections.entrypoint.to=websecure
      --entrypoints.web.http.redirections.entrypoint.scheme=https
      --entrypoints.web.http.redirections.entrypoint.permanent=true
      --entrypoints.websecure.address=:443
      --providers.docker.exposedbydefault=false
      --providers.docker.watch=true
      --providers.file.filename={{ traefik_config_dir }}/traefik-dynamic.yml
      --providers.file.watch=true
      --certificatesresolvers.step-ca.acme.email={{ traefik_acme_email }}
      --certificatesresolvers.step-ca.acme.storage=/acme/acme.json
      --certificatesresolvers.step-ca.acme.caserver=https://step-ca.{{ lan_domain }}:{{ step_ca_port }}/acme/acme/directory
      --certificatesresolvers.step-ca.acme.tlschallenge=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - "{{ traefik_config_dir }}/traefik-dynamic.yml:/traefik-dynamic.yml:ro"
      - "{{ traefik_data_dir }}/acme:/acme"
      - /etc/ssl/certs/ca-certificates.crt:/etc/ssl/certs/ca-certificates.crt:ro
    labels:
      traefik.enable: "false"
