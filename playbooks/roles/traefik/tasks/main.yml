---
- ansible.builtin.include_tasks: deploy.yml
- name: Register Traefik CNAME
  ansible.builtin.include_role:
    name: common
    tasks_from: register_cname
  vars:
    cname_name: "{{ traefik_cname_name | default('traefik.' + inventory_hostname + '.' + lan_domain) }}"
    cname_target: "{{ traefik_cname_target | default(inventory_hostname + '.' + lan_domain) }}"
