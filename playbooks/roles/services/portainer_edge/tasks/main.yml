---
- name: Register this host as edge environment in Portainer
  ansible.builtin.include_tasks: edge_register.yml

- name: Ensure CA certificates are up to date
  ansible.builtin.command: update-ca-certificates
  changed_when: false

# Deploy only if edge key is available (set during registration)
- name: Create Portainer Edge directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ portainer_edge_opt_dir }}"
    - "{{ portainer_edge_data_dir }}"
  when: portainer_edge_key is defined and portainer_edge_key | length > 0

- name: Render Portainer Edge compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ portainer_edge_opt_dir }}/docker-compose.yml"
    mode: "0644"
  when: portainer_edge_key is defined and portainer_edge_key | length > 0

- name: Deploy Portainer Edge Agent stack
  community.docker.docker_compose_v2:
    project_src: "{{ portainer_edge_opt_dir }}"
    files:
      - docker-compose.yml
    state: present
    pull: missing
  when: portainer_edge_key is defined and portainer_edge_key | length > 0
