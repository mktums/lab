---
- name: Create step-ca directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.owner }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ step_ca_data_dir }}", owner: "{{ container_puid }}", mode: "0700" }
    - { path: "{{ step_ca_opt_dir }}", owner: "root", mode: "0700" }

- name: Render compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ step_ca_opt_dir }}/docker-compose.yml"
    mode: "0644"
  notify: Restart step-ca

- name: Deploy step-ca stack
  community.docker.docker_compose_v2:
    project_src: "{{ step_ca_opt_dir }}"
    files:
      - docker-compose.yml
    state: present
    wait: true
    wait_timeout: 300
    pull: missing
