---
# Install step-ca's root cert into the system trust store on the CA host itself.
# This lets curl, apt, and other tools on this host trust *.lan certs.

- name: Read root CA certificate from data directory
  ansible.builtin.slurp:
    src: "{{ step_ca_data_dir }}/certs/root_ca.crt"
  register: _step_ca_root_cert

- name: Install root CA into system trust store
  ansible.builtin.copy:
    content: "{{ _step_ca_root_cert.content | b64decode }}"
    dest: /usr/local/share/ca-certificates/step-ca-root.crt
    mode: "0644"
  notify: Update CA certificates

- name: Ensure CA certificates are up to date
  ansible.builtin.command: update-ca-certificates

