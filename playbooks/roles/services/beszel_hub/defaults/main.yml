# Beszel Hub defaults

# Image
beszel_image_name: "henrygd/beszel"
beszel_image_tag: "latest"

# Paths
beszel_hub_opt_dir: "{{ ansible_opt_base }}/beszel"
beszel_data_dir: "{{ docker_data_base }}/beszel"

# Network
beszel_port: 8090

# CNAME subdomain (without .{{ lan_domain }})
beszel_hub_cname: "beszel"
