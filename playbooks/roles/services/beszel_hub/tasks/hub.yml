---
- name: Create Beszel hub directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ beszel_data_dir }}"
    - "{{ beszel_hub_opt_dir }}"

- name: Render compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ beszel_hub_opt_dir }}/docker-compose.yml"
    mode: "0644"

- name: Deploy Beszel hub stack
  community.docker.docker_compose_v2:
    project_src: "{{ beszel_hub_opt_dir }}"
    files:
      - docker-compose.yml
    state: present
    pull: missing
  notify: Restart beszel
