---
- name: Create Beszel directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ beszel_data_dir }}"

- name: Deploy Beszel hub container
  community.docker.docker_container:
    name: beszel
    image: "{{ beszel_image_name }}:{{ beszel_image_tag }}"
    pull: missing
    restart_policy: unless-stopped
    published_ports:
      - "{{ beszel_port }}:8090"
    volumes:
      - "{{ beszel_data_dir }}/data:/beszel_data"
    env:
      APP_URL: "https://{{ beszel_cname }}.{{ lan_domain }}"
      USER_EMAIL: "{{ beszel_admin_email }}"
      USER_PASSWORD: "{{ beszel_admin_password }}"
    labels:
      traefik.enable: "true"
      traefik.http.routers.beszel.rule: "Host(`{{ beszel_cname }}.{{ lan_domain }}`)"
      traefik.http.routers.beszel.entrypoints: "websecure"
      traefik.http.routers.beszel.tls: "true"
      traefik.http.routers.beszel.tls.certresolver: "step-ca"
      traefik.http.services.beszel.loadbalancer.server.port: "{{ beszel_port }}"
  notify: Restart beszel
