---
- name: Create qBittorrent directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ container_puid }}"
    group: "{{ container_pgid }}"
    mode: "0755"
  loop:
    - "{{ qbittorrent_data_dir }}"
    - "{{ downloads_dir }}"

- name: Remove stale IPC/lock files from qBittorrent config
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ qbittorrent_data_dir }}/qBittorrent/ipc-socket"
    - "{{ qbittorrent_data_dir }}/qBittorrent/lockfile"

- name: Create opt directory
  ansible.builtin.file:
    path: "{{ qbittorrent_opt_dir }}"
    state: directory
    mode: "0755"

- name: Render compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ qbittorrent_opt_dir }}/docker-compose.yml"
    mode: "0644"

- name: Deploy qBittorrent stack
  community.docker.docker_compose_v2:
    project_src: "{{ qbittorrent_opt_dir }}"
    state: present
    pull: missing
    wait: true
    wait_timeout: 180
  notify: Restart qBittorrent

- name: Wait for qBittorrent WebUI to be ready
  ansible.builtin.command:
    cmd: "docker compose -f {{ qbittorrent_opt_dir }}/docker-compose.yml exec qbittorrent curl -sf http://localhost:8080/"
  register: _qbit_ready
  retries: 15
  delay: 4
  changed_when: false

- name: Check if desired password already works
  ansible.builtin.uri:
    url: "http://localhost:{{ qbittorrent_web_port }}/api/v2/auth/login"
    method: POST
    body: "username=admin&password={{ qbittorrent_password }}"
    headers:
      Content-Type: "application/x-www-form-urlencoded"
      Referer: "http://localhost:{{ qbittorrent_web_port }}"
    status_code: 200
    return_content: true
  register: _qbit_login_check
  no_log: true
  failed_when: false

- name: Get temporary password from container logs
  ansible.builtin.command:
    cmd: "docker compose -f {{ qbittorrent_opt_dir }}/docker-compose.yml logs qbittorrent"
  register: _qbit_logs
  changed_when: false
  when:
    - not ansible_check_mode
    - _qbit_login_check.content != 'Ok.'

- name: Extract temporary password
  ansible.builtin.set_fact:
    _qbit_temp_pass: "{{ (_qbit_logs.stdout | default('')) | regex_findall('temporary password.*: (\\S+)') | first | default('') }}"
  when: _qbit_logs is not skipped

- name: Login with temporary password
  ansible.builtin.uri:
    url: "http://localhost:{{ qbittorrent_web_port }}/api/v2/auth/login"
    method: POST
    body: "username=admin&password={{ _qbit_temp_pass }}"
    headers:
      Content-Type: "application/x-www-form-urlencoded"
      Referer: "http://localhost:{{ qbittorrent_web_port }}"
    status_code: 200
  register: _qbit_login_temp
  no_log: true
  when: _qbit_temp_pass | default('') | length > 0

- name: Change password via API
  ansible.builtin.uri:
    url: "http://localhost:{{ qbittorrent_web_port }}/api/v2/app/setPreferences"
    method: POST
    body: "json={{ {'web_ui_password': qbittorrent_password} | to_json | urlencode }}"
    headers:
      Content-Type: "application/x-www-form-urlencoded"
      Referer: "http://localhost:{{ qbittorrent_web_port }}"
      Cookie: "{{ _qbit_login_temp.cookies_string }}"
    status_code: 200
  no_log: true
  when: _qbit_temp_pass | default('') | length > 0
