---
- name: Create Beszel agent directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ beszel_data_dir }}"
    - "{{ beszel_agent_opt_dir }}"

- name: Set agent build facts
  ansible.builtin.set_fact:
    beszel_agent_image: >-
      {{ beszel_agent_image_nvidia_name if nvidia_gpu | default(false) else beszel_agent_image_name }}:{{
         beszel_agent_image_nvidia_tag if nvidia_gpu | default(false) else beszel_agent_image_tag }}
    beszel_agent_devices: >-
      {{ beszel_smart_devices | default([]) | reject('equalto', '') | list }}
    beszel_agent_cap_add: >-
      {{ beszel_smart_cap_add | default([]) }}
    beszel_agent_gpu_collector: "{{ 'true' if nvidia_gpu | default(false) else 'false' }}"

- name: Render compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ beszel_agent_opt_dir }}/docker-compose.yml"
    mode: "0644"

- name: Deploy Beszel agent stack
  community.docker.docker_compose_v2:
    project_src: "{{ beszel_agent_opt_dir }}"
    files:
      - docker-compose.yml
    state: present
    pull: missing
  when: beszel_token | default('') | length > 0
