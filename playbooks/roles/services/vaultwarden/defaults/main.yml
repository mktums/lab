# Vaultwarden defaults

# Image
vaultwarden_image_name: "vaultwarden/server"
vaultwarden_image_tag: "latest"

# Paths
vaultwarden_opt_dir: "{{ ansible_opt_base }}/vaultwarden"
vaultwarden_data_dir: "{{ docker_data_base }}/vaultwarden"

# CNAME subdomain (without .{{ lan_domain }})
vaultwarden_cname: "vw"

# DB init (create user + database on first deploy, idempotent)
vaultwarden_db_init: true

# Kopia backup staging dir (copies config.json, attachments/, sends/ with preserved attrs)
vaultwarden_backup_staging_dir: "{{ ansible_opt_base }}/vaultwarden/backups"
