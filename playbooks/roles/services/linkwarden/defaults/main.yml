# Linkwarden defaults

# Images
linkwarden_image_name: "ghcr.io/linkwarden/linkwarden"
linkwarden_image_tag: "latest"

# Paths
linkwarden_data_dir: "{{ docker_data_base }}/linkwarden"

# CNAME subdomain (without .{{ lan_domain }})
linkwarden_cname: "links"

