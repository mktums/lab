# Beszel Agent defaults

# Image
beszel_agent_image_name: "henrygd/beszel-agent"
beszel_agent_image_tag: "alpine"
beszel_agent_image_nvidia_name: "henrygd/beszel-agent-nvidia"
beszel_agent_image_nvidia_tag: "latest"

# Paths
beszel_data_dir: "{{ docker_data_base }}/beszel-agent"

# Network (hub connection)
beszel_port: 8090
beszel_cname: "beszel"

# Agent settings
beszel_disk_cache: "1h"
