---
# IMPORTANT: This task must run AFTER step_ca.yml completes its trust store updates

- name: Create Traefik directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ traefik_config_dir }}"
    - "{{ traefik_data_dir }}/acme"

- name: Flush handlers to ensure CA trust store is updated before Traefik restarts
  ansible.builtin.meta: flush_handlers

- name: Ensure CA certificates are up to date with fresh trust store sync
  ansible.builtin.command: update-ca-certificates --fresh
  changed_when: false
  
- name: Deploy Traefik dynamic config only (for routers/middlewares)
  ansible.builtin.template:
    src: traefik-dynamic.yml.j2
    dest: "{{ traefik_config_dir }}/traefik-dynamic.yml"
    mode: "0644"
  notify: Restart Traefik

- name: Ensure acme.json exists with correct permissions
  ansible.builtin.file:
    path: "{{ traefik_data_dir }}/acme/acme.json"
    state: touch
    owner: root
    group: root
    mode: "0600"
    modification_time: preserve
    access_time: preserve

- name: Render compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ traefik_config_dir }}/docker-compose.yml"
    mode: "0644"
  notify: Restart Traefik

- name: Deploy Traefik stack
  community.docker.docker_compose_v2:
    project_src: "{{ traefik_config_dir }}"
    files:
      - docker-compose.yml
    state: present
    wait: true
    wait_timeout: 300
    pull: missing
