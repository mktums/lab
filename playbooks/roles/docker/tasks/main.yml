---
- name: Install Docker apt dependencies
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
    state: present

- name: Create /etc/apt/keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    force: false

- name: Get system architecture
  ansible.builtin.command: dpkg --print-architecture
  register: _dpkg_arch
  changed_when: false

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ _dpkg_arch.stdout }} signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu
      {{ ansible_facts['distribution_release'] }} stable
    filename: docker
    state: present

- name: Install Docker Engine
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Enable and start Docker service
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Add users to docker group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_users | default([]) }}"

- name: Install nvidia-container-toolkit
  when: nvidia_gpu | default(false)
  block:
    - name: Add NVIDIA container toolkit GPG key
      ansible.builtin.get_url:
        url: https://nvidia.github.io/libnvidia-container/gpgkey
        dest: /etc/apt/keyrings/nvidia-container-toolkit.asc
        mode: "0644"
        force: false

    - name: Add NVIDIA container toolkit repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [signed-by=/etc/apt/keyrings/nvidia-container-toolkit.asc]
          https://nvidia.github.io/libnvidia-container/stable/deb/$(ARCH) /
        filename: nvidia-container-toolkit
        state: present

    - name: Install nvidia-container-toolkit package
      ansible.builtin.apt:
        name: nvidia-container-toolkit
        state: present
        update_cache: true

    - name: Check if NVIDIA runtime already configured
      ansible.builtin.stat:
        path: /etc/docker/daemon.json
      register: _daemon_json

    - name: Read daemon.json if exists
      ansible.builtin.slurp:
        src: /etc/docker/daemon.json
      register: _daemon_json_content
      when: _daemon_json.stat.exists

    - name: Configure Docker to use NVIDIA runtime
      ansible.builtin.command: nvidia-ctk runtime configure --runtime=docker
      notify: Restart Docker
      when: >
        not _daemon_json.stat.exists or
        'nvidia' not in (_daemon_json_content.content | default('') | b64decode)
