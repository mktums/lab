---
# IPv6 — configurable via lan_ipv6_enabled (default: false, same as before)
- name: Disable IPv6 leases on LAN
  community.openwrt.uci:
    command: set
    key: dhcp.lan.dhcpv6
    value: disabled
  notify: Commit and restart dnsmasq
  when: not lan_ipv6_enabled | default(false)

- name: Disable IPv6 RA on LAN
  community.openwrt.uci:
    command: set
    key: dhcp.lan.ra
    value: disabled
  notify: Commit and restart dnsmasq
  when: not lan_ipv6_enabled | default(false)

- name: Set local domain
  community.openwrt.uci:
    command: set
    key: dhcp.@dnsmasq[0].domain
    value: "{{ lan_domain }}"
  notify: Commit and restart dnsmasq

- name: Set LAN DHCP start
  community.openwrt.uci:
    command: set
    key: dhcp.lan.start
    value: "{{ lan_dhcp_start }}"
  notify: Commit and restart dnsmasq

- name: Set LAN DHCP limit
  community.openwrt.uci:
    command: set
    key: dhcp.lan.limit
    value: "{{ lan_dhcp_limit }}"
  notify: Commit and restart dnsmasq

- name: Set LAN DHCP leasetime
  community.openwrt.uci:
    command: set
    key: dhcp.lan.leasetime
    value: "{{ lan_dhcp_leasetime }}"
  notify: Commit and restart dnsmasq

- name: Create IoT DHCP config
  community.openwrt.uci:
    command: set
    key: dhcp.iot
    value: dhcp
  notify: Commit and restart dnsmasq

- name: Set IoT DHCP interface
  community.openwrt.uci:
    command: set
    key: dhcp.iot.interface
    value: iot
  notify: Commit and restart dnsmasq

- name: Set IoT DHCP start
  community.openwrt.uci:
    command: set
    key: dhcp.iot.start
    value: "{{ iot_dhcp_start }}"
  notify: Commit and restart dnsmasq

- name: Set IoT DHCP limit
  community.openwrt.uci:
    command: set
    key: dhcp.iot.limit
    value: "{{ iot_dhcp_limit }}"
  notify: Commit and restart dnsmasq

- name: Set IoT DHCP leasetime
  community.openwrt.uci:
    command: set
    key: dhcp.iot.leasetime
    value: "{{ iot_dhcp_leasetime }}"
  notify: Commit and restart dnsmasq

- name: Add DHCP reservations
  community.openwrt.uci:
    command: set
    key: "dhcp.{{ item.name }}"
    value: host
  loop: "{{ dhcp_reservations }}"
  notify: Commit and restart dnsmasq

- name: Set DHCP reservation MAC
  community.openwrt.uci:
    command: set
    key: "dhcp.{{ item.name }}.mac"
    value: "{{ item.mac }}"
  loop: "{{ dhcp_reservations }}"
  notify: Commit and restart dnsmasq

- name: Set DHCP reservation IP
  community.openwrt.uci:
    command: set
    key: "dhcp.{{ item.name }}.ip"
    value: "{{ item.ip }}"
  loop: "{{ dhcp_reservations }}"
  notify: Commit and restart dnsmasq

- name: Add DNS CNAMEs
  community.openwrt.uci:
    command: set
    key: "dhcp.{{ item.cname | regex_replace('[^a-zA-Z0-9_]', '_') }}"
    value: cname
  loop: "{{ dns_cnames }}"
  notify: Commit and restart dnsmasq

- name: Set CNAME record name
  community.openwrt.uci:
    command: set
    key: "dhcp.{{ item.cname | regex_replace('[^a-zA-Z0-9_]', '_') }}.cname"
    value: "{{ item.cname }}"
  loop: "{{ dns_cnames }}"
  notify: Commit and restart dnsmasq

- name: Set CNAME record target
  community.openwrt.uci:
    command: set
    key: "dhcp.{{ item.cname | regex_replace('[^a-zA-Z0-9_]', '_') }}.target"
    value: "{{ item.target }}"
  loop: "{{ dns_cnames }}"
  notify: Commit and restart dnsmasq
