---
- name: Commit and reload system
  community.openwrt.uci:
    command: commit
    key: system
  notify: Reload system service

- name: Reload system service
  community.openwrt.command:
    cmd: /etc/init.d/system reload
  changed_when: true

- name: Commit and restart dnsmasq
  community.openwrt.uci:
    command: commit
    key: dhcp
  notify: Restart dnsmasq service

- name: Restart dnsmasq service
  community.openwrt.command:
    cmd: /etc/init.d/dnsmasq restart
  changed_when: true

- name: Commit and reload firewall
  community.openwrt.uci:
    command: commit
    key: firewall
  notify: Reload firewall service

- name: Reload firewall service
  community.openwrt.command:
    cmd: /etc/init.d/firewall reload
  changed_when: true

- name: Commit and reload wifi
  community.openwrt.uci:
    command: commit
    key: wireless
  notify: Reload wifi service

- name: Reload wifi service
  community.openwrt.command:
    cmd: wifi up
  changed_when: true

- name: Commit and restart network
  community.openwrt.uci:
    command: commit
    key: network
  notify: Restart network service

- name: Restart network service
  community.openwrt.command:
    cmd: /etc/init.d/network restart
  changed_when: true
