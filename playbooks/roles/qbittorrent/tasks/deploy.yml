---
- name: Create qBittorrent directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0755"
  loop:
    - /data/docker/qbittorrent
    - /data/downloads

- name: Deploy qBittorrent container
  community.docker.docker_container:
    name: qbittorrent
    image: lscr.io/linuxserver/qbittorrent:libtorrentv1
    pull: missing
    restart_policy: unless-stopped
    published_ports:
      - "127.0.0.1:8080:8080"
      - "6881:6881"
      - "6881:6881/udp"
    env:
      PUID: "1000"
      PGID: "1000"
      TZ: "{{ timezone }}"
      WEBUI_PORT: "8080"
      TORRENTING_PORT: "6881"
    volumes:
      - /data/docker/qbittorrent:/config
      - /data/downloads:/downloads
    labels:
      traefik.enable: "true"
      traefik.http.routers.qbittorrent.rule: "Host(`qbit{{ lab_index }}.{{ lan_domain }}`)"
      traefik.http.routers.qbittorrent.entrypoints: "websecure"
      traefik.http.routers.qbittorrent.tls: "true"
      traefik.http.routers.qbittorrent.tls.certresolver: "step-ca"
      traefik.http.services.qbittorrent.loadbalancer.server.port: "8080"
  notify: Restart qBittorrent

- name: Wait for qBittorrent WebUI to be ready
  ansible.builtin.uri:
    url: "http://localhost:8080"
    status_code: 200
  register: _qbit_ready
  until: _qbit_ready.status == 200
  retries: 15
  delay: 4

- name: Check if desired password already works
  ansible.builtin.uri:
    url: "http://localhost:8080/api/v2/auth/login"
    method: POST
    body: "username=admin&password={{ qbittorrent_password }}"
    headers:
      Content-Type: "application/x-www-form-urlencoded"
      Referer: "http://localhost:8080"
    status_code: 200
    return_content: true
  register: _qbit_login_check
  no_log: true
  failed_when: false

- name: Get temporary password from container logs
  ansible.builtin.command: docker logs qbittorrent
  register: _qbit_logs
  changed_when: false
  when: _qbit_login_check.content != 'Ok.'

- name: Extract temporary password
  ansible.builtin.set_fact:
    _qbit_temp_pass: "{{ _qbit_logs.stdout | regex_search('temporary password.*: (\\S+)', '\\1') | first | default('') }}"
  when: _qbit_logs is not skipped

- name: Login with temporary password
  ansible.builtin.uri:
    url: "http://localhost:8080/api/v2/auth/login"
    method: POST
    body: "username=admin&password={{ _qbit_temp_pass }}"
    headers:
      Content-Type: "application/x-www-form-urlencoded"
      Referer: "http://localhost:8080"
    status_code: 200
  register: _qbit_login_temp
  no_log: true
  when: _qbit_temp_pass | default('') | length > 0

- name: Change password via API
  ansible.builtin.uri:
    url: "http://localhost:8080/api/v2/app/setPreferences"
    method: POST
    body: "json={{ {'web_ui_password': qbittorrent_password} | to_json | urlencode }}"
    headers:
      Content-Type: "application/x-www-form-urlencoded"
      Referer: "http://localhost:8080"
      Cookie: "{{ _qbit_login_temp.cookies_string }}"
    status_code: 200
  no_log: true
  when: _qbit_temp_pass | default('') | length > 0
