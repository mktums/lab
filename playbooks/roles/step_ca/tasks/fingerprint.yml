---
# Extract the CA root fingerprint from the running container.
# Traefik needs this to trust the ACME endpoint.

- name: Get CA root certificate fingerprint
  community.docker.docker_container_exec:
    container: step-ca
    command: step certificate fingerprint certs/root_ca.crt
  register: _step_ca_fingerprint
  changed_when: false

- name: Set CA fingerprint fact
  ansible.builtin.set_fact:
    step_ca_fingerprint: "{{ _step_ca_fingerprint.stdout | trim }}"

- name: Print CA fingerprint (add to vault as vault_step_ca_fingerprint)
  ansible.builtin.debug:
    msg: >
      step-ca root fingerprint: {{ step_ca_fingerprint }}
      Add to vault/secrets.yml as: vault_step_ca_fingerprint: "{{ step_ca_fingerprint }}"
  when: vault_step_ca_fingerprint | default('') | length == 0
