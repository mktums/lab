---
- name: Create step-ca directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.owner }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: /data/docker/step-ca, owner: "1000", mode: "0700" }
    - { path: /opt/step-ca,         owner: "root", mode: "0700" }
    - { path: /opt/step-ca/secrets, owner: "1000", mode: "0700" }

- name: Write CA password file
  ansible.builtin.copy:
    content: "{{ step_ca_password }}"
    dest: /opt/step-ca/secrets/password
    owner: "1000"
    group: "1000"
    mode: "0400"

- name: Deploy step-ca container
  community.docker.docker_container:
    name: step-ca
    image: smallstep/step-ca:latest
    pull: missing
    restart_policy: unless-stopped
    published_ports:
      - "{{ step_ca_port }}:9000"
    dns_servers:
      - "{{ lan_dns }}"
    volumes:
      - /data/docker/step-ca:/home/step
      - /opt/step-ca/secrets/password:/run/secrets/password:ro
    env:
      DOCKER_STEPCA_INIT_NAME: "{{ step_ca_name }}"
      DOCKER_STEPCA_INIT_DNS_NAMES: "localhost,step-ca.{{ lan_domain }},{{ inventory_hostname }}.{{ lan_domain }}"
      DOCKER_STEPCA_INIT_ACME: "true"
      DOCKER_STEPCA_INIT_PASSWORD_FILE: /run/secrets/password
  notify: Restart step-ca

- name: Wait for step-ca to be ready
  ansible.builtin.uri:
    url: "https://localhost:{{ step_ca_port }}/health"
    validate_certs: false
    status_code: 200
  register: _step_ca_health
  until: _step_ca_health.status == 200
  retries: 15
  delay: 4
