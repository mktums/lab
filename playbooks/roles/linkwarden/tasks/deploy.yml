---
- name: Create Linkwarden data directory
  ansible.builtin.file:
    path: /srv/docker_data/linkwarden
    state: directory
    mode: "0755"

- name: Ensure linkwarden Docker network exists
  community.docker.docker_network:
    name: linkwarden
    state: present

- name: Write Linkwarden .env file
  ansible.builtin.copy:
    content: |
      NEXTAUTH_SECRET={{ linkwarden_nextauth_secret }}
      NEXTAUTH_URL=https://links.{{ lan_domain }}/api/v1/auth
      BASE_URL=https://links.{{ lan_domain }}
      DATABASE_URL=postgresql://linkwarden:{{ linkwarden_db_password }}@db.{{ lan_domain }}:5432/linkwarden
      MEILI_HOST=http://meilisearch:7700
      MEILI_MASTER_KEY={{ linkwarden_meili_master_key }}
      STORAGE_FOLDER=/data
    dest: /srv/docker_data/linkwarden/.env
    mode: "0600"
    backup: true

- name: Deploy Meilisearch container
  community.docker.docker_container:
    name: meilisearch
    image: getmeili/meilisearch:latest
    pull: missing
    restart_policy: unless-stopped
    networks:
      - name: linkwarden
    volumes:
      - /srv/docker_data/linkwarden/meilisearch:/meili_data
    env:
      MEILI_MASTER_KEY: "{{ linkwarden_meili_master_key }}"
      MEILI_NO_ANALYTICS: "true"
  notify: Restart linkwarden

- name: Deploy Linkwarden container
  community.docker.docker_container:
    name: linkwarden
    image: ghcr.io/linkwarden/linkwarden:latest
    pull: missing
    restart_policy: unless-stopped
    networks:
      - name: linkwarden
    volumes:
      - /srv/docker_data/linkwarden/data:/data/data
    env_file:
      - /srv/docker_data/linkwarden/.env
    labels:
      traefik.enable: "true"
      traefik.http.routers.linkwarden.rule: "Host(`links.{{ lan_domain }}`)"
      traefik.http.routers.linkwarden.entrypoints: "websecure"
      traefik.http.routers.linkwarden.tls: "true"
      traefik.http.routers.linkwarden.tls.certresolver: "step-ca"
      traefik.http.services.linkwarden.loadbalancer.server.port: "3000"
  notify: Restart linkwarden
