---
- name: Create Linkwarden data directory
  ansible.builtin.file:
    path: /data/docker/linkwarden
    state: directory
    mode: "0755"

- name: Deploy Meilisearch container
  community.docker.docker_container:
    name: meilisearch
    image: getmeili/meilisearch:latest
    pull: missing
    restart_policy: unless-stopped
    volumes:
      - /data/docker/linkwarden/meilisearch:/meili_data
    env:
      MEILI_MASTER_KEY: "{{ linkwarden_meili_master_key }}"
      MEILI_NO_ANALYTICS: "true"
  notify: Restart linkwarden

- name: Deploy Linkwarden container
  community.docker.docker_container:
    name: linkwarden
    image: ghcr.io/linkwarden/linkwarden:latest
    pull: missing
    restart_policy: unless-stopped
    dns_servers:
      - "{{ lan_dns }}"
    volumes:
      - /data/docker/linkwarden/data:/data/data
    env:
      NEXTAUTH_SECRET: "{{ linkwarden_nextauth_secret }}"
      NEXTAUTH_URL: "https://links.{{ lan_domain }}/api/v1/auth"
      BASE_URL: "https://links.{{ lan_domain }}"
      DATABASE_URL: "postgresql://linkwarden:{{ linkwarden_db_password }}@db.{{ lan_domain }}:5432/linkwarden"
      MEILI_HOST: "http://meilisearch:7700"
      MEILI_MASTER_KEY: "{{ linkwarden_meili_master_key }}"
      STORAGE_FOLDER: "/data"
    links:
      - meilisearch
    labels:
      traefik.enable: "true"
      traefik.http.routers.linkwarden.rule: "Host(`links.{{ lan_domain }}`)"
      traefik.http.routers.linkwarden.entrypoints: "websecure"
      traefik.http.routers.linkwarden.tls: "true"
      traefik.http.routers.linkwarden.tls.certresolver: "step-ca"
      traefik.http.services.linkwarden.loadbalancer.server.port: "3000"
  notify: Restart linkwarden
