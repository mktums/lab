---
- name: Create Meilisearch data directory
  ansible.builtin.file:
    path: "{{ meilisearch_data_dir }}"
    state: directory
    mode: "0755"
  when: inventory_hostname in groups.get('linkwarden_hosts', [])

- name: Render compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ meilisearch_data_dir }}/docker-compose.yml"
    mode: "0644"
  when: inventory_hostname in groups.get('linkwarden_hosts', [])

- name: Deploy Meilisearch stack
  community.docker.docker_compose_v2:
    project_src: "{{ meilisearch_data_dir }}"
    files:
      - docker-compose.yml
    state: present
    wait: true
    wait_timeout: 300
    pull: missing
  notify: Restart meilisearch
  when: inventory_hostname in groups.get('linkwarden_hosts', [])

# Register CNAME after deployment (DNS must exist before services reference it)
- name: Register Meilisearch CNAME
  ansible.builtin.include_role:
    name: common
    tasks_from: register_cname
  vars:
    cname_name: "{{ meilisearch_cname }}.{{ lan_domain }}"
    cname_target: "{{ inventory_hostname + '.' + lan_domain }}"
  when: inventory_hostname in groups.get('linkwarden_hosts', [])
