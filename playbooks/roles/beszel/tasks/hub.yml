---
- name: Create Beszel directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /data/docker/beszel

- name: Deploy Beszel hub container
  community.docker.docker_container:
    name: beszel
    image: henrygd/beszel:latest
    pull: missing
    restart_policy: unless-stopped
    published_ports:
      - "8090:8090"
    volumes:
      - /data/docker/beszel/data:/beszel_data
    env:
      APP_URL: "https://beszel.{{ lan_domain }}"
      USER_EMAIL: "{{ beszel_admin_email }}"
      USER_PASSWORD: "{{ beszel_admin_password }}"
    labels:
      traefik.enable: "true"
      traefik.http.routers.beszel.rule: "Host(`beszel.{{ lan_domain }}`)"
      traefik.http.routers.beszel.entrypoints: "websecure"
      traefik.http.routers.beszel.tls: "true"
      traefik.http.routers.beszel.tls.certresolver: "step-ca"
      traefik.http.services.beszel.loadbalancer.server.port: "8090"
  notify: Restart beszel
