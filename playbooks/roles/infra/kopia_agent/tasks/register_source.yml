---
# register_source.yml — idempotent Kopia source registration per service
# Included via loop from main.yml. Loop variable: source_def
#   source_def.key    = service name / override_username
#   source_def.value  = config dict { hostname, paths, actions, schedule }

- name: Ensure Kopia agent directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0700"
  loop:
    - "{{ kopia_agent_config_dir }}"
    - "{{ kopia_cache_base }}"

- name: Deploy systemd timer and service templates
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: "0644"
  loop:
    - { src: kopia-backup@.timer.j2, dest: /etc/systemd/system/kopia-backup@.timer }
    - { src: kopia-backup@.service.j2, dest: /etc/systemd/system/kopia-backup@.service }

- name: Check if user exists on Kopia server
  ansible.builtin.shell: >-
    docker compose exec kopia-server kopia server users list
  args:
    chdir: "{{ kopia_opt_dir }}"
  delegate_to: "{{ kopia_server_host }}"
  register: kopia_users_list
  changed_when: false
  no_log: true

- name: Add new user on Kopia server (if not exists)
  ansible.builtin.shell: >-
    docker compose exec -T kopia-server kopia server users add {{ source_def.key }}@{{ source_def.value.hostname }} --user-password='{{ kopia_repo_password }}'
  args:
    chdir: "{{ kopia_opt_dir }}"
  delegate_to: "{{ kopia_server_host }}"
  changed_when: false
  no_log: true
  when: (source_def.key + '@' + source_def.value.hostname) not in kopia_users_list.stdout

- name: Refresh Kopia server after adding new user
  ansible.builtin.shell: >-
    docker compose exec -T kopia-server kopia server refresh --address=https://{{ kopia_cname }}.{{ lan_domain }}:443 --server-control-username=control --server-control-password='{{ kopia_control_password }}'
  args:
    chdir: "{{ kopia_opt_dir }}"
  delegate_to: "{{ kopia_server_host }}"
  changed_when: false
  no_log: true
  when: (source_def.key + '@' + source_def.value.hostname) not in kopia_users_list.stdout

- name: Set user password on Kopia server (if exists)
  ansible.builtin.shell: >-
    docker compose exec -T kopia-server kopia server users set {{ source_def.key }}@{{ source_def.value.hostname }} --user-password='{{ kopia_repo_password }}'
  args:
    chdir: "{{ kopia_opt_dir }}"
  delegate_to: "{{ kopia_server_host }}"
  changed_when: false
  no_log: true
  when: (source_def.key + '@' + source_def.value.hostname) in kopia_users_list.stdout



- name: Check if agent config exists
  ansible.builtin.stat:
    path: "{{ kopia_agent_config_dir }}/{{ source_def.key }}.config"
  register: kopia_config_stat

- name: Connect Kopia agent with override identity (first run only)
  ansible.builtin.shell: |
    /usr/bin/kopia repository connect server \
      --config-file={{ kopia_agent_config_dir }}/{{ source_def.key }}.config \
      --url={{ kopia_server_url }} \
      --enable-actions \
      --password='{{ kopia_repo_password }}' \
      --override-username={{ source_def.key }} \
      --override-hostname={{ source_def.value.hostname }}
  when: not kopia_config_stat.stat.exists

# --- Pre-action .env file (if defined in inventory) ---

- name: Deploy pre-action .env file (if defined)
  ansible.builtin.template:
    src: kopia_agent.env.j2
    dest: "{{ kopia_agent_config_dir }}/{{ source_def.key }}.env"
    mode: "0644"
  when: source_def.value.pre_action_env is defined and source_def.value.pre_action_env | length > 0

# --- Per-path configuration ---
# Disabled paths: clear Kopia policy only if timer was previously active (previously enabled)
# Enabled paths: set retention and deploy actions

- name: Check if backup timer exists for disabled sources
  ansible.builtin.command: systemctl list-unit-files --type=timer --no-legend
  register: kopia_timer_list
  changed_when: false
  when: not (source_def.value.enabled | default(true))

- name: Clear Kopia policy for disabled paths that were previously enabled
  ansible.builtin.shell: >-
    /usr/bin/kopia policy set {{ item.key }} --clear \
      --config-file={{ kopia_agent_config_dir }}/{{ source_def.key }}.config
  loop: "{{ source_def.value.paths | dict2items }}"
  changed_when: false
  when:
    - not (source_def.value.enabled | default(true))
    - "'kopia-backup@{{ source_def.key }}.timer' in kopia_timer_list.stdout"

- name: Set per-source retention policy
  ansible.builtin.shell:
    cmd: "{{ kopia_policy_cmd }}"
  vars:
    kopia_retention_flags: >-
      {%- for key, val in (item.value.retention | default({})).items() %}
      --keep-{{ key | replace('keep_', '') }}={{ val|string }}{% endfor -%}
    kopia_policy_cmd: "/usr/bin/kopia policy set {{ item.key }} --config-file={{ kopia_agent_config_dir }}/{{ source_def.key }}.config{{ ' ' + kopia_retention_flags if kopia_retention_flags.strip() else '' }}"
  loop: "{{ source_def.value.paths | dict2items }}"
  changed_when: false
  when: item.value.enabled | default(true)

# --- Snapshot-root action scripts (inherited by all enabled paths, convention-based resolution) ---

- name: Deploy before-snapshot-root action script (if enabled)
  ansible.builtin.template:
    src: "actions/{{ source_def.key }}/before-snapshot-root.sh.j2"
    dest: "{{ kopia_agent_config_dir }}/{{ source_def.key }}_before-snapshot-root.sh"
    mode: "0755"
  when: (source_def.value.actions | default({})).get('before-snapshot-root', false)

- name: Deploy after-snapshot-root action script (if enabled)
  ansible.builtin.template:
    src: "actions/{{ source_def.key }}/after-snapshot-root.sh.j2"
    dest: "{{ kopia_agent_config_dir }}/{{ source_def.key }}_after-snapshot-root.sh"
    mode: "0755"
  when: (source_def.value.actions | default({})).get('after-snapshot-root', false)

- name: Register snapshot-root actions in Kopia policy (if defined)
  ansible.builtin.shell:
    cmd: "/usr/bin/kopia policy set {{ item.key }} --config-file={{ kopia_agent_config_dir }}/{{ source_def.key }}.config{{ ' ' + action_flags if action_flags.strip() else '' }}"
  vars:
    action_flags: >-
      {%- if (source_def.value.actions | default({})).get('before-snapshot-root', false) %}
      --before-snapshot-root-action={{ kopia_agent_config_dir }}/{{ source_def.key }}_before-snapshot-root.sh{% endif -%}
      {%- if (source_def.value.actions | default({})).get('after-snapshot-root', false) %}
      --after-snapshot-root-action={{ kopia_agent_config_dir }}/{{ source_def.key }}_after-snapshot-root.sh{% endif -%}
  loop: "{{ source_def.value.paths | dict2items }}"
  changed_when: false
  when:
    - item.value.enabled | default(true)
    - (source_def.value.actions | default({})).get('before-snapshot-root', false) or (source_def.value.actions | default({})).get('after-snapshot-root', false)

# --- Folder-level action scripts (per-path, NOT inherited by Kopia) ---

- name: Deploy folder-level action scripts (if defined)
  ansible.builtin.template:
    src: "actions/{{ source_def.key }}/{{ item.value._action_type }}.sh.j2"
    dest: "{{ kopia_agent_config_dir }}/{{ source_def.key }}_{{ item.value._action_type }}_{{ item.key | hash('md5')[:8] }}.sh"
    mode: "0755"
  loop: >-
    {{ source_def.value.folder_actions | default({}) | dict2items }}
  when:
    - source_def.value.folder_actions is defined and source_def.value.folder_actions | length > 0
    - item.value.enabled | default(true)

- name: Register folder-level actions in Kopia policy (per-path, if defined)
  ansible.builtin.shell:
    cmd: "/usr/bin/kopia policy set {{ item.key }} --config-file={{ kopia_agent_config_dir }}/{{ source_def.key }}.config{{ ' ' + folder_action_flags if folder_action_flags.strip() else '' }}"
  vars:
    path_hash: "{{ item.key | hash('md5')[:8] }}"
    action_flags_list:
      - "{% if 'before-folder' in item.value %}--before-folder-action={{ kopia_agent_config_dir }}/{{ source_def.key }}_before-folder_{{ path_hash }}.sh{% endif %}"
      - "{% if 'after-folder' in item.value %}--after-folder-action={{ kopia_agent_config_dir }}/{{ source_def.key }}_after-folder_{{ path_hash }}.sh{% endif %}"
    folder_action_flags: "{{ action_flags_list | reject('equalto', '') | join(' ') }}"
  loop: >-
    {{ source_def.value.folder_actions | default({}) | dict2items }}
  changed_when: false
  when:
    - source_def.value.folder_actions is defined and source_def.value.folder_actions | length > 0
    - item.value.enabled | default(true)

# --- Ensure backup directories exist ---

- name: Ensure backup source directories exist
  ansible.builtin.file:
    path: "{{ item.key }}"
    state: directory
    mode: "0700"
  loop: "{{ source_def.value.paths | dict2items }}"
  when: item.value.enabled | default(true)

# --- Seed snapshots (only if none exist) ---

- name: Check if snapshots exist per path
  ansible.builtin.shell: |
    /usr/bin/kopia snapshot list {{ item.key }} \
      --config-file={{ kopia_agent_config_dir }}/{{ source_def.key }}.config
  loop: "{{ source_def.value.paths | dict2items }}"
  register: kopia_seed_check
  changed_when: false
  when: item.value.enabled | default(true)

- name: Create first snapshot (seed paths with no snapshots)
  ansible.builtin.shell: |
    /usr/bin/kopia snapshot create {{ item.item.key }} \
      --config-file={{ kopia_agent_config_dir }}/{{ source_def.key }}.config
  loop: "{{ kopia_seed_check.results }}"
  when:
    - '(item.stdout | length == 0) or ("no snapshots" in item.stdout)'

# --- Timer control (enabled/disabled via inventory) ---

- name: Reload systemd (pick up template changes)
  ansible.builtin.systemd:
    daemon_reload: true

- name: Stop and disable per-service backup timer (if disabled in inventory)
  ansible.builtin.systemd:
    name: "kopia-backup@{{ source_def.key }}.timer"
    state: stopped
    enabled: no
  when: not (source_def.value.enabled | default(true))

- name: Start and enable per-service backup timer (if enabled in inventory)
  ansible.builtin.systemd:
    name: "kopia-backup@{{ source_def.key }}.timer"
    state: started
    enabled: yes
  when: source_def.value.enabled | default(true)
