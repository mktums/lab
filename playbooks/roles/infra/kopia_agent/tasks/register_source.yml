---
# register_source.yml — idempotent Kopia source registration per service
# Included via: include_role: name=kopia_agent tasks_from=register_source
# Required vars from caller: kopia_override_username, kopia_override_hostname
# Optional vars:
#   kopia_sources: dict of path → { retention: {...}, before_folder_action_path, after_folder_action_path }
#   kopia_pre_action_env: dict of env vars (deployed as .env file)
#   kopia_before_snapshot_root_action_path: template path (inherited by all sources)
#   kopia_after_snapshot_root_action_path: template path (inherited by all sources)

- name: Ensure Kopia agent directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0700"
  loop:
    - "{{ kopia_agent_config_dir }}"
    - "{{ kopia_cache_base }}"

- name: Deploy systemd timer and service templates
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: "0644"
  loop:
    - { src: kopia-backup@.timer.j2, dest: /etc/systemd/system/kopia-backup@.timer }
    - { src: kopia-backup@.service.j2, dest: /etc/systemd/system/kopia-backup@.service }

- name: Check if user exists on Kopia server
  ansible.builtin.shell: >-
    docker compose exec kopia-server kopia server users list
  args:
    chdir: "{{ kopia_opt_dir }}"
  delegate_to: "{{ kopia_server_host }}"
  register: kopia_users_list
  changed_when: false
  no_log: true

- name: Provision user on Kopia server (skip if exists)
  ansible.builtin.shell: >-
    docker compose exec -T kopia-server kopia server users add {{ kopia_override_username }}@{{ kopia_override_hostname }} --user-password='{{ kopia_repo_password }}'
  args:
    chdir: "{{ kopia_opt_dir }}"
  delegate_to: "{{ kopia_server_host }}"
  changed_when: false
  no_log: true
  when: (kopia_override_username + '@' + kopia_override_hostname) not in kopia_users_list.stdout

- name: Check if agent config exists
  ansible.builtin.stat:
    path: "{{ kopia_agent_config_dir }}/{{ kopia_override_username }}.config"
  register: kopia_config_stat

- name: Connect Kopia agent with override identity (first run only)
  ansible.builtin.shell: |
    /usr/bin/kopia repository connect server \
      --config-file={{ kopia_agent_config_dir }}/{{ kopia_override_username }}.config \
      --url={{ kopia_server_url }} \
      --enable-actions \
      --password='{{ kopia_repo_password }}' \
      --override-username={{ kopia_override_username }} \
      --override-hostname={{ kopia_override_hostname }}
  when: not kopia_config_stat.stat.exists

# --- Per-source retention ---

- name: Set per-source retention policy
  ansible.builtin.shell: >-
    /usr/bin/kopia policy set {{ item.key }}
    {{ '--config-file=' ~ kopia_agent_config_dir ~ '/' ~ kopia_override_username ~ '.config' }}
    {{ '--keep-latest=' ~ item.value.retention.keep_latest | default(omit) }}
    {{ '--keep-hourly=' ~ item.value.retention.keep_hourly | default(omit) }}
    {{ '--keep-daily=' ~ item.value.retention.keep_daily | default(omit) }}
    {{ '--keep-weekly=' ~ item.value.retention.keep_weekly | default(omit) }}
    {{ '--keep-monthly=' ~ item.value.retention.keep_monthly | default(omit) }}
    {{ '--keep-annual=' ~ item.value.retention.keep_annual | default(omit) }}
  loop: "{{ kopia_sources | dict2items }}"
  changed_when: false
  when: kopia_sources is defined and kopia_sources | length > 0

# --- Pre-action .env file ---

- name: Deploy pre-action .env file (if defined)
  ansible.builtin.template:
    src: kopia_agent.env.j2
    dest: "{{ kopia_agent_config_dir }}/{{ kopia_override_username }}.env"
    mode: "0644"
  when: kopia_pre_action_env is defined and kopia_pre_action_env | length > 0

# --- Folder-level action scripts (per-source, NOT inherited) ---

- name: Deploy before-folder action script per source (if defined)
  ansible.builtin.template:
    src: "{{ item.value.before_folder_action_path }}"
    dest: "{{ kopia_agent_config_dir }}/{{ kopia_override_username }}_before-folder_{{ item.key | hash('md5')[:8] }}.sh"
    mode: "0755"
  loop: "{{ kopia_sources | dict2items }}"
  when: item.value.before_folder_action_path is defined

- name: Deploy after-folder action script per source (if defined)
  ansible.builtin.template:
    src: "{{ item.value.after_folder_action_path }}"
    dest: "{{ kopia_agent_config_dir }}/{{ kopia_override_username }}_after-folder_{{ item.key | hash('md5')[:8] }}.sh"
    mode: "0755"
  loop: "{{ kopia_sources | dict2items }}"
  when: item.value.after_folder_action_path is defined

- name: Register folder-level actions in Kopia policy (per-source, if defined)
  ansible.builtin.shell: >-
    /usr/bin/kopia policy set {{ item.key }}
    {{ '--config-file=' ~ kopia_agent_config_dir ~ '/' ~ kopia_override_username ~ '.config' }}
    {% if item.value.before_folder_action_path is defined %}
    --before-folder-action={{ kopia_agent_config_dir }}/{{ kopia_override_username }}_before-folder_{{ item.key | hash('md5')[:8] }}.sh
    {% endif %}
    {% if item.value.after_folder_action_path is defined %}
    --after-folder-action={{ kopia_agent_config_dir }}/{{ kopia_override_username }}_after-folder_{{ item.key | hash('md5')[:8] }}.sh
    {% endif %}
  loop: "{{ kopia_sources | dict2items }}"
  changed_when: false
  when:
    - (item.value.before_folder_action_path is defined) or (item.value.after_folder_action_path is defined)
    - kopia_sources is defined and kopia_sources | length > 0

# --- Snapshot-root action scripts (inherited by all sources) ---

- name: Deploy before-snapshot-root action script (if defined)
  ansible.builtin.template:
    src: "{{ kopia_before_snapshot_root_action_path }}"
    dest: "{{ kopia_agent_config_dir }}/{{ kopia_override_username }}_before-snapshot-root.sh"
    mode: "0755"
  when: kopia_before_snapshot_root_action_path is defined

- name: Deploy after-snapshot-root action script (if defined)
  ansible.builtin.template:
    src: "{{ kopia_after_snapshot_root_action_path }}"
    dest: "{{ kopia_agent_config_dir }}/{{ kopia_override_username }}_after-snapshot-root.sh"
    mode: "0755"
  when: kopia_after_snapshot_root_action_path is defined

- name: Register snapshot-root actions in Kopia policy (if defined)
  ansible.builtin.shell: >-
    /usr/bin/kopia policy set {{ item.key }}
    {{ '--config-file=' ~ kopia_agent_config_dir ~ '/' ~ kopia_override_username ~ '.config' }}
    {% if kopia_before_snapshot_root_action_path is defined %}
    --before-snapshot-root-action={{ kopia_agent_config_dir }}/{{ kopia_override_username }}_before-snapshot-root.sh
    {% endif %}
    {% if kopia_after_snapshot_root_action_path is defined %}
    --after-snapshot-root-action={{ kopia_agent_config_dir }}/{{ kopia_override_username }}_after-snapshot-root.sh
    {% endif %}
  loop: "{{ kopia_sources | dict2items }}"
  changed_when: false
  when:
    - (kopia_before_snapshot_root_action_path is defined) or (kopia_after_snapshot_root_action_path is defined)
    - kopia_sources is defined and kopia_sources | length > 0

# --- Start timer ---

- name: Reload systemd (pick up template changes)
  ansible.builtin.systemd:
    daemon_reload: true

- name: Ensure backup source directories exist
  ansible.builtin.file:
    path: "{{ item.key }}"
    state: directory
    mode: "0700"
  loop: "{{ kopia_sources | dict2items }}"
  when: kopia_sources is defined and kopia_sources | length > 0

# --- Seed snapshots (only if source has none) ---

- name: Check if snapshots exist per source (seed guard)
  ansible.builtin.shell: |
    /usr/bin/kopia snapshot list {{ item.key }} \
      --config-file={{ kopia_agent_config_dir }}/{{ kopia_override_username }}.config
  loop: "{{ kopia_sources | dict2items }}"
  register: kopia_seed_check
  changed_when: false
  when: kopia_sources is defined and kopia_sources | length > 0

- name: Create first snapshot (seed sources for --all)
  ansible.builtin.shell: |
    /usr/bin/kopia snapshot create {{ item.item.key }} \
      --config-file={{ kopia_agent_config_dir }}/{{ kopia_override_username }}.config
  loop: "{{ kopia_seed_check.results | default([]) }}"
  when:
    - '(item.stdout | length == 0) or ("no snapshots" in item.stdout)'

- name: Start and enable per-service backup timer
  ansible.builtin.systemd:
    name: "kopia-backup@{{ kopia_override_username }}.timer"
    state: started
    enabled: yes
