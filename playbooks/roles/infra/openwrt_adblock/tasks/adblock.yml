---
- name: Check if adblock-lean is already installed
  community.openwrt.command:
    cmd: sh -c 'test -f /etc/init.d/adblock-lean && echo yes || echo no'
  register: _adblock_installed_raw
  changed_when: false

- name: Set adblock-lean installed fact
  ansible.builtin.set_fact:
    _adblock_installed: "{{ _adblock_installed_raw.stdout | trim == 'yes' }}"

- name: Check if adblock-lean config exists
  community.openwrt.command:
    cmd: sh -c 'test -f /etc/adblock-lean/config && echo yes || echo no'
  register: _adblock_config_raw
  changed_when: false

- name: Set adblock-lean config exists fact
  ansible.builtin.set_fact:
    _adblock_config_exists: "{{ _adblock_config_raw.stdout | trim == 'yes' }}"

- name: Install adblock-lean optional processing packages
  action: "community.openwrt.{{ openwrt_package_manager }}"
  args:
    name: "gawk,sed,coreutils-sort"
    state: present

- name: Download adblock-lean installer
  community.openwrt.command:
    cmd: >
      uclient-fetch https://raw.githubusercontent.com/lynxthecat/adblock-lean/master/abl-install.sh
      -O /tmp/abl-install.sh
  changed_when: true
  when: not _adblock_installed

- name: Install adblock-lean
  community.openwrt.command:
    cmd: sh /tmp/abl-install.sh -v release
  changed_when: true
  when: not _adblock_installed

- name: Generate default adblock-lean config (medium preset)
  community.openwrt.command:
    cmd: >-
      sh -c 'luci_preset=medium luci_upd_cron_job=1 luci_cron_schedule="{{ adblock_cron_schedule }}"
      DO_DIALOGS=0 service adblock-lean gen_config'
  changed_when: true
  when: not _adblock_config_exists

- name: Flush handlers to restart dnsmasq before starting adblock-lean
  ansible.builtin.meta: flush_handlers

- name: Start adblock-lean
  community.openwrt.command:
    cmd: sh -c '/etc/init.d/adblock-lean running || service adblock-lean start'
  register: _adblock_start
  changed_when: "'running' not in _adblock_start.stdout"
