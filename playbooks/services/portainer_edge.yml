---
- name: Deploy Portainer Edge Agent
  hosts: portainer_edge_hosts
  become: true
  vars_files:
    - ../../vault/secrets.yml
  pre_tasks:
    - ansible.builtin.set_fact:
        ca_ready: "{{ step_ca_root_cert_pem | length > 0 }}"
  roles:
    - role: portainer_edge
      when: ca_ready
