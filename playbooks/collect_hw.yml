---
- name: Collect Hardware Reports
  hosts: servers
  become: true
  vars_files:
    - ../vault/secrets.yml
  vars:
    local_reports_dir: "{{ playbook_dir }}/../docs/hw_reports"
    script_src: "{{ playbook_dir }}/../scripts/hw_report.sh"

  pre_tasks:
    - name: Ensure local reports directory exists
      delegate_to: localhost
      become: false
      file:
        path: "{{ local_reports_dir }}"
        state: directory
      run_once: true

  tasks:
    - name: Copy hardware report script to Linux hosts
      copy:
        src: "{{ script_src }}"
        dest: /tmp/hw_report.sh
        mode: '0755'
      when: ansible_facts["system"] == "Linux"

    - name: Run report on Linux
      command: /tmp/hw_report.sh
      register: linux_report
      when: ansible_facts["system"] == "Linux"
      changed_when: false

    - name: Save Linux reports to local files
      delegate_to: localhost
      become: false
      copy:
        content: "{{ linux_report.stdout }}"
        dest: "{{ local_reports_dir }}/{{ inventory_hostname }}.md"
      when: ansible_facts["system"] == "Linux"

    - name: Cleanup | Remove temporary report script
      ansible.builtin.file:
        path: /tmp/hw_report.sh
        state: absent
      when: ansible_facts["system"] == "Linux"
