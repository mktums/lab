---
- name: Configure OpenWrt router
  hosts: routers
  gather_facts: false
  become: false
  vars_files:
    - ../vault/secrets.yml

  pre_tasks:
    - name: Warn that check mode is not supported for this playbook
      ansible.builtin.fail:
        msg: >
          The router playbook does not support --check mode.
          Re-run without --check.
      when: ansible_check_mode

  roles:
    - role: community.openwrt.init
    - role: openwrt_base
    - role: openwrt_adblock
