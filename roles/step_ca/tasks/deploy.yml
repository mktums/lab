---
- name: Create step-ca directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.owner }}"
    mode: "{{ item.mode }}"
  loop:
    # step-ca runs as UID 1000 inside the container
    - { path: /data/docker/step-ca, owner: "1000", mode: "0700" }
    - { path: /opt/step-ca,         owner: "root", mode: "0700" }
    - { path: /opt/step-ca/secrets, owner: "root", mode: "0700" }

- name: Write CA password file (used for key encryption + JWK provisioner)
  ansible.builtin.copy:
    content: "{{ vault_step_ca_password }}"
    dest: /opt/step-ca/secrets/password
    owner: root
    group: root
    mode: "0600"

- name: Deploy step-ca docker-compose
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/step-ca/docker-compose.yml
    mode: "0644"
  notify: Restart step-ca

- name: Pull and start step-ca
  community.docker.docker_compose_v2:
    project_src: /opt/step-ca
    state: present
    pull: missing

# Give step-ca a moment to initialize on first run
- name: Wait for step-ca to be ready
  ansible.builtin.uri:
    url: "https://localhost:{{ step_ca_port }}/health"
    validate_certs: false
    status_code: 200
  register: _step_ca_health
  until: _step_ca_health.status == 200
  retries: 15
  delay: 4
