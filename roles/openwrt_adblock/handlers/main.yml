---
# Note: "Commit and restart dnsmasq" / "Restart dnsmasq service" are intentionally
# omitted here — they are already defined in openwrt_base/handlers/main.yml and
# Ansible deduplicates handlers by name within a play.

- name: Commit and restart unbound
  community.openwrt.uci:
    command: commit
    key: unbound
  notify: Restart unbound service

- name: Restart unbound service
  community.openwrt.command:
    cmd: /etc/init.d/unbound restart
  changed_when: true
