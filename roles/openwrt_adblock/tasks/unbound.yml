---
- name: Install unbound
  community.openwrt.opkg:
    name: "unbound-daemon,unbound-anchor"
    state: present

# Point dnsmasq at unbound for upstream resolution
- name: Clear existing upstream DNS servers
  community.openwrt.uci:
    command: delete
    key: dhcp.@dnsmasq[0].server
  failed_when: false

- name: Set dnsmasq upstream to unbound
  community.openwrt.uci:
    command: add_list
    key: dhcp.@dnsmasq[0].server
    value: "127.0.0.1#5335"
  notify: Commit and restart dnsmasq

# Disable dnsmasq's own DNSSEC since unbound handles it
- name: Disable dnsmasq DNSSEC
  community.openwrt.uci:
    command: set
    key: dhcp.@dnsmasq[0].dnssec
    value: "0"
  notify: Commit and restart dnsmasq

# Unbound UCI config
- name: Set unbound listen port
  community.openwrt.uci:
    command: set
    key: unbound.@unbound[0].listen_port
    value: "5335"
  notify: Commit and restart unbound

- name: Enable DNSSEC validation
  community.openwrt.uci:
    command: set
    key: unbound.@unbound[0].validator
    value: "1"
  notify: Commit and restart unbound

- name: Enable DNSSEC auto-anchor
  community.openwrt.uci:
    command: set
    key: unbound.@unbound[0].validator_ntp
    value: "1"
  notify: Commit and restart unbound

- name: Enable prefetching for lower latency
  community.openwrt.uci:
    command: set
    key: unbound.@unbound[0].prefetch
    value: "1"
  notify: Commit and restart unbound

- name: Enable prefetch DNSKEY
  community.openwrt.uci:
    command: set
    key: unbound.@unbound[0].prefetch_root
    value: "1"
  notify: Commit and restart unbound

- name: Harden against DNS rebinding
  community.openwrt.uci:
    command: set
    key: unbound.@unbound[0].rebind_protection
    value: "1"
  notify: Commit and restart unbound

- name: Hide unbound version from queries
  community.openwrt.uci:
    command: set
    key: unbound.@unbound[0].hide_binddata
    value: "1"
  notify: Commit and restart unbound

- name: Enable query minimisation (RFC 7816)
  community.openwrt.uci:
    command: set
    key: unbound.@unbound[0].query_minimize
    value: "1"
  notify: Commit and restart unbound

- name: Commit unbound config
  community.openwrt.uci:
    command: commit
    key: unbound

- name: Enable unbound service
  community.openwrt.command:
    cmd: sh -c '/etc/init.d/unbound enabled || /etc/init.d/unbound enable'
  register: _unbound_enable
  changed_when: _unbound_enable.rc == 0 and 'enabled' not in _unbound_enable.stdout

- name: Start unbound service
  community.openwrt.command:
    cmd: sh -c '/etc/init.d/unbound running || /etc/init.d/unbound start'
  register: _unbound_start
  changed_when: "'running' not in _unbound_start.stdout"
